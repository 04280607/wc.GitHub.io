<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扬州伟昌 - 铝型材系统解决方案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans SC";overflow-x:hidden;background:#f5f5f5;}

header{position:fixed;width:100%;top:0;background:rgba(255,255,255,0.95);display:flex;justify-content:space-between;padding:15px 40px;z-index:999;align-items:center;}
header h1{color:#caa64b;}
nav{display:flex;align-items:center;}
nav a{margin:0 10px;text-decoration:none;color:#333;}
.contact-top{font-size:14px;color:#666;margin-left:20px;}

 /* ✅ Banner轮播 */
.banner{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.slider{
  position:absolute;
  width:100%;
  height:100%;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.slide.active{
  opacity:1;
}

.banner-text{
  position:absolute;
  z-index:2;
  color:#fff;
  font-size:42px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* ✅ 左右箭头 */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:#fff;
  background:rgba(0,0,0,0.3);
  padding:10px 18px;
  border-radius:50%;
  cursor:pointer;
  z-index:3;
  transition:0.3s;
}

.arrow:hover{
  background:rgba(0,0,0,0.6);
}

.arrow.left{left:30px;}
.arrow.right{right:30px;}

.section{padding:100px 40px;text-align:center;}
.title{font-size:32px;margin-bottom:40px;color:#333;}

.grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{width:280px;background:#fff;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);padding:20px;transition:.3s;}
.card:hover{transform:translateY(-10px);} 

.gallery{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.gallery img{width:300px;height:200px;object-fit:cover;border-radius:10px;}

.lang-select{margin-left:20px;}
.float-btn{position:fixed;right:20px;bottom:20px;background:#caa64b;color:#fff;padding:15px;border-radius:50%;font-size:20px;}
</style>
</head>

<body>

<header>
<h1>扬州伟昌</h1>
<nav>
<a href="#">首页</a>
<a href="#about">企业印象</a>
<a href="#product">产品</a>
<a href="#case">案例</a>
<select class="lang-select">
<option>中文</option>
<option>English</option>
</select>
<div class="contact-top">☎ 19951785296</div>
</nav>
</header>

<!-- ✅ 轮播Banner -->
<section class="banner">
  <div class="slider">
    <div class="slide active" style="background-image:url('./images/1.jpg')"></div>
    <div class="slide" style="background-image:url('./images/2.jpg')"></div>

    高端系统窗解决方案
  </div>

  <div class="arrow right">❯</div>

<div class="card"><h3>集团简介</h3><p>华昌集团专注铝型材研发与制造，行业领先。</p></div>
<div class="card"><h3>质量管理</h3><p>严格质量体系，确保每一件产品稳定可靠。</p></div>

</div>

<a class="float-btn" href="tel:19951785296">☎</a>

<!-- ✅ 轮播JS -->
<script>
let current = 0
const slides = document.querySelectorAll('.slide')
const leftBtn = document.querySelector('.arrow.left')
const rightBtn = document.querySelector('.arrow.right')
let timer

function showSlide(index){
  slides.forEach(s => s.classList.remove('active'))
  slides[index].classList.add('active')
}

function nextSlide(){
  current = (current + 1) % slides.length
  showSlide(current)
}

function prevSlide(){
  current = (current - 1 + slides.length) % slides.length
  showSlide(current)
}

function startAuto(){
  timer = setInterval(nextSlide, 4000)
}

function stopAuto(){
  clearInterval(timer)
}

leftBtn.onclick = ()=>{
  prevSlide()
  stopAuto()
  startAuto()
}

rightBtn.onclick = ()=>{
  nextSlide()
  stopAuto()
  startAuto()
}

startAuto()
</script>

</body>
</html>
